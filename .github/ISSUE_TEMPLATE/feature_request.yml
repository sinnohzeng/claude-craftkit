name: "功能建议 Feature Request"
description: "提出新功能或改进建议 Suggest a new feature or improvement"
labels: ["enhancement"]
body:
  - type: dropdown
    id: plugin
    attributes:
      label: "相关插件 Related Plugin"
      options:
        - writing-polish
        - workflow-toolkit
        - "新插件建议 New plugin idea"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: "功能描述 Feature Description"
      description: "清晰描述你希望实现的功能"
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: "使用场景 Use Case"
      description: "描述你在什么情况下会用到这个功能"
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: "替代方案 Alternatives Considered"
      description: "你是否考虑过其他方案？（可选）"
    validations:
      required: false
